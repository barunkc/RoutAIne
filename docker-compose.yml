version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: routaine-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: routaine_user
      MONGO_INITDB_ROOT_PASSWORD: routaine_password
      MONGO_INITDB_DATABASE: routaine
    volumes:
      - mongodb_data:/data/db
    networks:
      - routaine-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routaine-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://routaine_user:routaine_password@mongodb:27017/routaine
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      DEBUG: 'false'
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - routaine-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: routaine-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: RoutAIne
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - routaine-network

volumes:
  mongodb_data:

networks:
  routaine-network:
    driver: bridge
